name: lerobot_calvin
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  - python=3.10
  - pip
  - numpy=1.24
  - scipy
  - matplotlib
  - ffmpeg
  - cmake
  - patchelf

  # PyTorch CUDA 11.8
  - pytorch=2.1.0
  - torchvision=0.16.0
  - torchaudio=2.1.0
  - pytorch-cuda=11.8

  - pip:
    - lerobot>=0.1.0

    # CALVIN 仿真评估依赖
    - calvin-agent @ git+https://github.com/mees/calvin.git#egg=calvin_agent&subdirectory=calvin_agent
    - calvin-env @ git+https://github.com/mees/calvin.git#egg=calvin_env&subdirectory=calvin_env

    - wandb>=0.16.0

    - hydra-core>=1.3.0
    - omegaconf>=2.3.0
    - einops>=0.7.0
    - timm>=0.9.0
    - transformers>=4.35.0
    - accelerate>=0.24.0
    - datasets>=2.14.0
    - huggingface_hub>=0.19.0
    - imageio>=2.31.0
    - imageio-ffmpeg>=0.4.9
    - opencv-python>=4.8.0
    - Pillow>=10.0.0
    - tqdm>=4.66.0
    - tensorboard>=2.14.0
    - pyzmq>=25.1.0
    - gym>=0.26.0
    - pybullet>=3.2.6
